<!DOCTYPE html>
<html>
<head>
    <title>Find Your Crop</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<nav>

<h2>🌱 OptiCrop</h2>

<ul>

<li><a href="/">Home</a></li>

<li><a href="/findyourcrop">Find Your Crop</a></li>

<li><a href="/about">About</a></li>

</ul>

</nav>

<div class="container">

<h1>Crop Recommendation</h1>

<form action="/predict" method="POST">

<input type="number" step="any" name="N" placeholder="Nitrogen (N)" required>

<input type="number" step="any" name="P" placeholder="Phosphorus (P)" required>

<input type="number" step="any" name="K" placeholder="Potassium (K)" required>

<input type="number" step="any" name="temperature" placeholder="Temperature" required>

<input type="number" step="any" name="humidity" placeholder="Humidity" required>

<input type="number" step="any" name="ph" placeholder="pH Value" required>

<input type="number" step="any" name="rainfall" placeholder="Rainfall" required>

<br><br>

<button type="submit">Predict Crop</button>

</form>

<br>

<h2 style="color:green;">
{{ prediction_text }}
</h2>

</div>

</body>

</html>
